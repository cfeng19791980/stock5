<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock5 - 5分钟流式分析系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --neon-cyan: #00d4ff;
            --neon-green: #00ff88;
            --neon-pink: #db2777;
            --neon-purple: #7c3aed;
            --neon-orange: #f59e0b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0a0e17 0%, #1a1a2e 50%, #16213e 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        .title {
            font-size: 32px;
            color: var(--neon-cyan);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        
        .subtitle {
            color: var(--text-secondary);
            margin-top: 10px;
        }
        
        .status-panel {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }
        
        .status-card {
            background: rgba(26, 34, 52, 0.75);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            min-width: 200px;
        }
        
        .status-label {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .status-value {
            color: var(--neon-cyan);
            font-size: 18px;
            margin-top: 5px;
        }
        
        .indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--neon-pink);
            display: inline-block;
            margin-right: 8px;
        }
        
        .indicator.running {
            background: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green);
        }
        
        .control-panel {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.4);
        }
        
        .btn-secondary {
            background: rgba(26, 34, 52, 0.75);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: var(--text-primary);
        }
        
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 15px;
        }
        
        .tab {
            padding: 10px 24px;
            border: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
            background: rgba(26, 34, 52, 0.5);
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
        }
        
        .tab:hover {
            background: rgba(26, 34, 52, 0.8);
            color: var(--text-primary);
        }
        
        .tab.active {
            background: rgba(26, 34, 52, 0.9);
            color: var(--neon-cyan);
            border-bottom: 2px solid var(--neon-cyan);
        }
        
        .data-panel {
            margin: 10px 0;
        }
        
        .panel-title {
            color: var(--neon-cyan);
            font-size: 20px;
            margin-bottom: 15px;
        }
        
        .stock-table {
            width: 100%;
            background: rgba(26, 34, 52, 0.75);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .stock-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .stock-table th, .stock-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
        }
        
        .stock-table th {
            background: rgba(0, 212, 255, 0.1);
            color: var(--neon-cyan);
        }
        
        .stock-table tr:hover {
            background: rgba(0, 212, 255, 0.05);
        }
        
        .score-high { color: var(--neon-green); }
        .score-mid  { color: var(--neon-purple); }
        .score-low  { color: var(--neon-pink); }
        .buy-signal  { color: var(--neon-green); font-weight: 700; }
        .sell-signal { color: var(--neon-pink); font-weight: 700; }
        .hold-signal { color: var(--neon-orange); }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">Stock5 - 流式分析系统</h1>
        <p class="subtitle">实时数据采集 + 技术指标分析 + AI预测评分</p>
    </div>
    
    <div class="status-panel">
        <div class="status-card">
            <div class="status-label">数据采集状态</div>
            <div class="status-value">
                <span class="indicator" id="collectionIndicator"></span>
                <span id="collectionStatus">未运行</span>
            </div>
        </div>
        
        <div class="status-card">
            <div class="status-label">数据库总量</div>
            <div class="status-value" id="dataCount">0条</div>
        </div>
        
        <div class="status-card">
            <div class="status-label">最后更新</div>
            <div class="status-value" id="lastUpdate">-</div>
        </div>
    </div>
    
    <div class="control-panel">
        <button class="btn btn-primary" onclick="startCollection()">启动采集</button>
        <button class="btn btn-secondary" onclick="stopCollection()">停止采集</button>
        <button class="btn btn-primary" onclick="runPredict()">执行预测</button>
        <button class="btn btn-secondary" onclick="refreshData()">刷新数据</button>
    </div>
    
    <div class="data-panel">
        <div class="tabs">
            <button class="tab active" data-tab="minute" onclick="switchTab('minute')">⚡ 5分钟短线</button>
            <button class="tab" data-tab="daily" onclick="switchTab('daily')">📈 日线中线</button>
        </div>
        
        <div class="loading" id="loading">预测中...</div>
        
        <div id="table-minute" class="stock-table tab-content">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>名称</th>
                        <th>代码</th>
                        <th>评分</th>
                        <th>预测</th>
                        <th>现价</th>
                        <th>涨跌%</th>
                        <th>RSI6</th>
                        <th>K</th>
                        <th>D</th>
                    </tr>
                </thead>
                <tbody id="body-minute">
                    <tr><td colspan="10" style="text-align:center;color:var(--text-secondary)">暂无数据</td></tr>
                </tbody>
            </table>
        </div>
        
        <div id="table-daily" class="stock-table tab-content" style="display:none">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>名称</th>
                        <th>代码</th>
                        <th>评分</th>
                        <th>建议</th>
                        <th>现价</th>
                        <th>涨跌%</th>
                        <th>成交量</th>
                        <th>信号</th>
                    </tr>
                </thead>
                <tbody id="body-daily">
                    <tr><td colspan="9" style="text-align:center;color:var(--text-secondary)">暂无数据</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        let refreshTimer = null;
        let currentTab = 'minute';
        
        // 初始化
        loadAll();
        startAutoRefresh();

        function startAutoRefresh() {
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(loadAll, 30000);
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(`table-${tab}`).style.display = '';
            // 如有数据直接展示，不必重复加载
            const body = document.getElementById(`body-${tab}`);
            if (body.children.length === 1 && body.children[0].children.length === 1) {
                loadAll();
            }
        }

        async function loadAll() {
            await Promise.all([loadMinute(), loadDaily()]);
        }

        async function loadJson(url) {
            try {
                const r = await fetch(url + '?t=' + Date.now());
                if (!r.ok) return null;
                return await r.json();
            } catch(e) {
                return null;
            }
        }

        // ========== 5分钟短线 ==========
        async function loadMinute() {
            const d = await loadJson('result_v5_minute.json');
            if (!d) return;
            renderMinute(d.predictions || []);
            document.getElementById('dataCount').textContent = (d.count || 0) + '只';
            if (d.timestamp) {
                document.getElementById('lastUpdate').textContent = new Date(d.timestamp).toLocaleTimeString();
            }
        }

        function renderMinute(predictions) {
            const tbody = document.getElementById('body-minute');
            document.getElementById('loading').style.display = 'none';
            
            if (!predictions || predictions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;color:var(--text-secondary)">暂无数据</td></tr>';
                return;
            }
            
            const top10 = predictions.sort((a,b) => b.score - a.score).slice(0, 10);
            tbody.innerHTML = '';
            
            top10.forEach((p, i) => {
                const sc = p.score >= 70 ? 'score-high' : p.score >= 50 ? 'score-mid' : 'score-low';
                const f = p.features || {};
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${i + 1}</td>
                    <td>${p.name || p.code}</td>
                    <td>${p.code || ''}</td>
                    <td class="${sc}">${p.score}</td>
                    <td class="${p.score >= 70 ? 'buy-signal' : p.score >= 40 ? 'hold-signal' : 'sell-signal'}">${p.prediction || '-'}</td>
                    <td>${(p.close || 0).toFixed(2)}</td>
                    <td>${(f.pct_chg || p.pct_chg || 0).toFixed(2)}%</td>
                    <td>${(f.rsi6 || 50).toFixed(1)}</td>
                    <td>${(f.k || 50).toFixed(1)}</td>
                    <td>${(f.d || 50).toFixed(1)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ========== 日线中线 ==========
        async function loadDaily() {
            const d = await loadJson('result_v5.json');
            if (!d) return;
            renderDaily(d.stocks || []);
        }

        function renderDaily(stocks) {
            const tbody = document.getElementById('body-daily');
            
            if (!stocks || stocks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:var(--text-secondary)">暂无数据</td></tr>';
                return;
            }
            
            const top10 = stocks.sort((a,b) => b.score - a.score).slice(0, 10);
            tbody.innerHTML = '';
            
            top10.forEach((s, i) => {
                const sc = s.score >= 60 ? 'score-high' : s.score >= 40 ? 'score-mid' : 'score-low';
                const sig = s.buy_signal ? 'buy-signal 🟢 买入' : s.sell_signal ? 'sell-signal 🔴 卖出' : 'hold-signal 🟡 观望';
                const tr = document.createElement('tr');
                const vol = s.volume >= 1e8 ? (s.volume / 1e8).toFixed(2) + '亿' : (s.volume / 1e4).toFixed(0) + '万';
                tr.innerHTML = `
                    <td>${i + 1}</td>
                    <td>${s.name || s.code}</td>
                    <td>${(s.code || '').replace(/\.(SH|SZ)/, '')}</td>
                    <td class="${sc}">${s.score}</td>
                    <td>${s.advice || '-'}</td>
                    <td>${(s.close || 0).toFixed(2)}</td>
                    <td>${(s.pct_chg || 0).toFixed(2)}%</td>
                    <td>${vol}</td>
                    <td>${sig}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ========== 操作按钮 ==========
        function runPredict() {
            document.getElementById('loading').style.display = 'block';
            // 直接调用后端运行预测脚本
            fetch('/api/run_predict', {method: 'POST'})
                .then(r => r.json())
                .then(d => {
                    console.log('预测执行:', d);
                    setTimeout(loadAll, 3000);
                })
                .catch(() => {
                    console.log('API不可用，展示已有结果');
                    document.getElementById('loading').style.display = 'none';
                    loadAll();
                });
        }

        function refreshData() {
            loadAll();
        }

        // ========== 采集控制 ==========
        const API_BASE = 'http://127.0.0.1:5005/api';

        function startCollection() {
            fetch(`${API_BASE}/start_collection`, {method: 'POST'})
                .then(r => r.json())
                .then(d => { if(d.success) { checkCollection(); } else { alert(d.message); }})
                .catch(e => alert('启动失败: ' + e.message));
        }
        function stopCollection() {
            fetch(`${API_BASE}/stop_collection`, {method: 'POST'})
                .then(r => r.json())
                .then(d => { if(d.success) checkCollection(); })
                .catch(e => alert('停止失败: ' + e.message));
        }
        function checkCollection() {
            fetch(`${API_BASE}/status`)
                .then(r => r.json())
                .then(d => {
                    const ind = document.getElementById('collectionIndicator');
                    const st = document.getElementById('collectionStatus');
                    if (d.collection_running) {
                        ind.classList.add('running'); st.textContent = '运行中';
                    } else {
                        ind.classList.remove('running'); st.textContent = '未运行';
                    }
                }).catch(() => {});
        }

        // 定期检查采集状态
        setInterval(checkCollection, 10000);
    </script>
</body>
</html>
