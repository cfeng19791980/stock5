<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock5 前端展示</title>
  <style>
    body {margin:0;font-family:Arial,Helvetica,sans-serif;background:#f5f5f5;}
    #hero {position:relative;height:80vh;background:url('https://images.unsplash.com/photo-1564865875712-3c5c22fe9caa?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;display:flex;align-items:center;justify-content:center;color:#fff;overflow:hidden;}
    #hero h1 {font-size:3rem;z-index:2;}
    #hero::before {content:'';position:absolute;inset:0;background:rgba(0,0,0,0.4);z-index:1;}
    #content {max-width:1200px;margin:auto;padding:2rem;}
    table {width:100%;border-collapse:collapse;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
    th, td {padding:0.5rem;text-align:center;border:1px solid #e0e0e0;}
    th {background:#fafafa;}
  </style>
  <!-- GSAP CDN -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
</head>
<body>
  <section id="hero">
    <h1 id="hero-title">Stock5 量化数据平台</h1>
  </section>
  <section id="content">
    <h2>最新 5 分钟行情（前 20 条）</h2>
    <table id="stock-table">
      <thead>
        <tr><th>代码</th><th>日期</th><th>收盘</th><th>涨跌幅</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>
  <script>
    // 页面加载动画
    gsap.from('#hero-title', {opacity:0, y:30, duration:1, ease:'power3.out'});
    // 背景视差
    gsap.to('#hero', {
      backgroundPosition: '50% 30%',
      ease: 'none',
      scrollTrigger:{trigger:'#hero', start:'top bottom', scrub:true}
    });

    // 拉取后端数据并渲染表格
    fetch('/api/minute_5_data?limit=20')
      .then(r=>r.json())
      .then(json=>{
        const tbody=document.querySelector('#stock-table tbody');
        json.data.slice(0,20).forEach(row=>{
          const tr=document.createElement('tr');
          tr.innerHTML=`<td>${row.code}</td><td>${row.date}</td><td>${row.close}</td><td>${row.pct_chg}</td>`;
          tbody.appendChild(tr);
        });
        // 表格出现动画（淡入+滑动）
        gsap.from('#stock-table tbody tr', {opacity:0, y:20, stagger:0.05, duration:0.6, ease:'power2.out'});
      })
      .catch(err=>console.error('data fetch error', err));
  </script>
</body>
</html>
